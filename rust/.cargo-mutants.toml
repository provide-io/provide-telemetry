#
# cargo-mutants configuration
#
# Equivalent mutations — these are excluded because the mutated code is
# indistinguishable from the original through any black-box test, not because
# the code is untested.

[mutants]
# Pass --tests to ALL cargo invocations (both the compile-check and the test-run
# phases). This skips building the 19 example binaries per mutation — examples
# have no tests, so they never detect mutations and only add compile overhead.
# cargo test --tests still includes all inline #[test] unit tests in src/ as
# well as every integration test in tests/, preserving full mutation coverage.
cargo_test_args = ["--tests"]
cargo_arg = ["--tests"]

# consent.rs: "TRACE" => 0 is identical to the _ => 0 fallthrough.
# Deleting the TRACE arm produces no observable behaviour change because both
# arms return 0, so no test can distinguish them.
#
# otel.rs: setup_otel and shutdown_otel are both #[cfg(feature = "otel")].
# cargo-mutants runs without --features otel, so the otel-feature variants are
# never compiled during mutation testing and these mutations are unobservable.
exclude_re = [
    # consent.rs: "TRACE" => 0 and _ => 0 both return 0 — indistinguishable.
    'delete match arm "TRACE" in log_level_order',
    # otel.rs: setup_otel and shutdown_otel are #[cfg(feature = "otel")],
    # not compiled in the default feature set used by cargo-mutants.
    'replace setup_otel -> Result<.*, TelemetryError> with Ok\(\)',
    'replace shutdown_otel with \(\)',
    # otel.rs: without the otel feature, OTEL_INSTALLED is always false.
    # Replacing otel_installed()/otel_installed_for_tests() with the literal
    # `false` is observable-equivalent to the real implementation.
    'replace otel_installed -> bool with false',
    'replace otel_installed_for_tests -> bool with false',
]
