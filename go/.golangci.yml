version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - goconst
    - unconvert
    - misspell
    - exhaustive
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 10
  exclusions:
    rules:
      - linters:
          - gocyclo
          - goconst
        path: "_test\\.go$"
