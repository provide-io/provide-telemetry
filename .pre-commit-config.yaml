repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-format
        name: ruff format
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies: ["tomli"]
        exclude: "package-lock\\.json"

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  - repo: local
    hooks:
      - id: max-loc
        name: python max loc
        entry: uv run python scripts/check_max_loc.py --max-lines 500
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: spdx-header-check
        name: python spdx header check
        entry: uv run python scripts/check_spdx_headers.py
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: event-literal-check
        name: telemetry event literal check
        entry: uv run python scripts/check_event_literals.py
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: spdx-header-normalize
        name: python spdx header normalize (manual)
        entry: uv run python scripts/normalize_spdx_headers.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]
        types: [python]

      - id: ty
        name: ty check
        entry: uv run ty check src tests
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: mypy
        name: mypy strict
        entry: uv run mypy src tests
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: bandit
        name: bandit
        entry: uv run bandit -r src -ll
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: pip-audit
        name: pip-audit (vulnerability scan)
        entry: uv run python -m pip_audit --path .
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: xenon
        name: xenon complexity
        entry: uv run xenon --max-absolute C --max-modules B --max-average A src/
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: vulture
        name: vulture dead code
        entry: uv run vulture src/ tests/
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: check-licenses
        name: license check
        entry: uv run python scripts/check_licenses.py
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

      - id: mutation-gate
        name: mutmut gate (manual)
        entry: uv run python scripts/run_mutation_gate.py --python-version 3.11 --max-children 4 --retries 1
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]
        types: [python]

      - id: performance-smoke
        name: performance smoke (manual)
        entry: uv run python scripts/run_performance_smoke.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]
        types: [python]

      # ── TypeScript package (typescript/) ───────────────────────────────────
      - id: ts-typecheck
        name: typescript type check
        entry: bash -c 'cd typescript && npm run typecheck'
        language: system
        pass_filenames: false
        always_run: true
        files: ^typescript/

      - id: ts-lint
        name: typescript lint (eslint)
        entry: bash -c 'cd typescript && npm run lint'
        language: system
        pass_filenames: false
        always_run: true
        files: ^typescript/src/|^typescript/tests/

      - id: ts-format-check
        name: typescript format check (prettier)
        entry: bash -c 'cd typescript && npm run format:check'
        language: system
        pass_filenames: false
        always_run: true
        files: ^typescript/src/|^typescript/tests/

      - id: ts-test
        name: typescript tests (vitest)
        entry: bash -c 'cd typescript && npm run test'
        language: system
        pass_filenames: false
        always_run: true
        files: ^typescript/
