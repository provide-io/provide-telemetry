name: Go CI

on:
  push:
    paths:
      - "go/**"
  pull_request:
    paths:
      - "go/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.22"
      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out ./...
      - name: Enforce 100% coverage
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "Total coverage: $TOTAL"
          if [ "$TOTAL" != "100.0%" ]; then
            echo "FAIL: coverage is $TOTAL, expected 100.0%"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v6  # TODO: pin to SHA when stable SHA is known
        with:
          working-directory: go

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.22"
      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gosec
        run: gosec ./...
      - name: Run govulncheck
        run: govulncheck ./...

  vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.22"
      - name: Run go vet
        run: go vet ./...

  mutation:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.22"
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      - name: Run mutation tests
        run: gremlins unleash ./...
