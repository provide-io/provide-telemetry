name: 🐹 CI — Go

on:
  push:
    paths:
      - "go/**"
      - "ci/**"
      - "VERSION"
      - ".github/workflows/ci-go.yml"
  pull_request:
    paths:
      - "go/**"
      - "ci/**"
      - "VERSION"
      - ".github/workflows/ci-go.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  GOWORK: off

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out .
      - name: Enforce 100% coverage
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "Total coverage: $TOTAL"
          if [ "$TOTAL" != "100.0%" ]; then
            echo "FAIL: coverage is $TOTAL, expected 100.0%"
            exit 1
          fi

  workspace-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      - name: Run go/logger tests with coverage
        if: ${{ hashFiles('go/logger/go.mod') != '' }}
        working-directory: go
        run: go test -race -coverprofile=logger.coverage.out ./logger/...
      - name: Enforce go/logger 100% coverage
        if: ${{ hashFiles('go/logger/go.mod') != '' }}
        working-directory: go
        run: |
          TOTAL=$(go tool cover -func=logger.coverage.out | grep total | awk '{print $3}')
          echo "Total coverage: $TOTAL"
          if [ "$TOTAL" != "100.0%" ]; then
            echo "FAIL: coverage is $TOTAL, expected 100.0%"
            exit 1
          fi
      - name: Run go/tracer tests with coverage
        if: ${{ hashFiles('go/tracer/go.mod') != '' }}
        working-directory: go
        run: go test -race -coverprofile=tracer.coverage.out ./tracer/...
      - name: Enforce go/tracer 100% coverage
        if: ${{ hashFiles('go/tracer/go.mod') != '' }}
        working-directory: go
        run: |
          TOTAL=$(go tool cover -func=tracer.coverage.out | grep total | awk '{print $3}')
          echo "Total coverage: $TOTAL"
          if [ "$TOTAL" != "100.0%" ]; then
            echo "FAIL: coverage is $TOTAL, expected 100.0%"
            exit 1
          fi
      - name: Confirm root module stays free of OTel SDK and exporter deps
        if: ${{ hashFiles('go/otel/go.mod') != '' }}
        working-directory: go
        run: |
          pattern='go\.opentelemetry\.io/(contrib/bridges/otelslog|otel/exporters/|otel/sdk|otel/log|otel/metric)'
          if command -v rg >/dev/null 2>&1; then
            matcher=(rg -n "$pattern" go.mod)
          else
            matcher=(grep -nE "$pattern" go.mod)
          fi
          if "${matcher[@]}"; then
            echo "FAIL: root go module should not depend on OTel SDK, exporters, bridge, logs, or metric modules"
            exit 1
          fi
          echo "OK: root go module stays on core/API-only dependencies"
      - name: Run go/otel tests with coverage
        if: ${{ hashFiles('go/otel/go.mod') != '' }}
        working-directory: go/otel
        run: go test -race -coverprofile=coverage.out .
      - name: Enforce go/otel 100% coverage
        if: ${{ hashFiles('go/otel/go.mod') != '' }}
        working-directory: go/otel
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "Total coverage: $TOTAL"
          if [ "$TOTAL" != "100.0%" ]; then
            echo "FAIL: coverage is $TOTAL, expected 100.0%"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      # Build golangci-lint v2 from source — v2 module path supports Go 1.25 and the v2 config format.
      # Pre-built binaries are Go 1.24 and refuse Go 1.25; v1 module path ignores v2 config.
      - name: Install golangci-lint (v2)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run --path-prefix=go
        working-directory: go

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gosec
        # Exclude cmd/e2e_cross_language_client — separate module requiring Go 1.26, only used for E2E
        run: gosec -exclude-dir=cmd/e2e_cross_language_client ./...
      - name: Run govulncheck
        # Scan the library package only — examples are demo code, not library, and their
        # transitive TLS usage should not block library releases.
        run: govulncheck .

  vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      - name: Run go vet
        run: go vet ./...

  performance-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      # uv provides a consistent Python invocation across OSes for the
      # perf_check.py + parse_go_bench.py pipeline. Both scripts use stdlib
      # only, so no `uv sync` here.
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          python-version: "3.11"
      # Run all benchmarks (-benchtime=100ms ≈ 1.5s total wall time) and pipe
      # through parse_go_bench → perf_check, which compares each per-op timing
      # against baselines/perf-go.json for this runner's OS bucket. Missing
      # buckets exit 0 with a hint so seeding via CI is straightforward.
      - name: Run perf gate
        shell: bash
        run: go test -bench=. -benchtime=100ms -run=^$ . | uv run --no-project python ../scripts/parse_go_bench.py | uv run --no-project python ../scripts/perf_check.py --lang go

  examples:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      # Build and run each standalone telemetry example (no live backend required)
      - name: Run telemetry examples
        run: |
          set -euo pipefail
          for d in examples/telemetry/*/; do
            echo "running $d"
            go run ./"$d"
          done
      - name: Build go/otel OpenObserve examples
        run: |
          if [ -d ./otel/examples/openobserve ]; then
            go build ./otel/examples/openobserve/...
          elif [ -d ./examples/openobserve ]; then
            go build ./examples/openobserve/...
          else
            echo "No OpenObserve examples present"
          fi

  otlp-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      - name: Prepare collector output directory
        run: |
          mkdir -p ../tests/integration/otel-output-go
          rm -f ../tests/integration/otel-output-go/*.json
      - name: Start OTLP collector
        run: |
          docker run -d --name otelcol-go \
            -p 4318:4318 \
            -p 13133:13133 \
            -v "$PWD/../tests/integration/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:0.102.1
      - name: Wait for collector health
        run: ../ci/wait-for-collector.sh
      - name: Run collector-backed OTLP smoke test
        run: |
          if [ -f ./otel/go.mod ]; then
            (cd ./otel && go test -run TestOTLPCollectorSmoke .)
          else
            go test -run TestOTLPCollectorSmoke .
          fi
        env:
          PROVIDE_TEST_OTLP_ENDPOINT: "http://127.0.0.1:4318"
          PROVIDE_TEST_OTLP_OUTPUT_DIR: "${{ github.workspace }}/tests/integration/otel-output-go"
      - name: Collector logs
        if: always()
        run: docker logs otelcol-go || true
      - name: Capture collector logs
        run: docker logs otelcol-go > ../tests/integration/otel-output-go/collector.log 2>&1
      # Poll the collector log until every required signal name appears, with
      # a 30s deadline (see ci/verify-collector-signals.sh for rationale).
      - name: Verify collector exported all signals
        env:
          OTELCOL_CONTAINER: otelcol-go
        run: ../ci/verify-collector-signals.sh ../tests/integration/otel-output-go/collector.log integration.collector.span integration.collector.requests integration.collector.log
      - name: Stop collector
        if: always()
        run: |
          docker stop otelcol-go || true
          docker rm otelcol-go || true
