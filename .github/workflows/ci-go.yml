name: Go CI

on:
  push:
    paths:
      - "go/**"
      - ".github/workflows/ci-go.yml"
  pull_request:
    paths:
      - "go/**"
      - ".github/workflows/ci-go.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.25"
      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out .
      - name: Enforce 100% coverage
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "Total coverage: $TOTAL"
          if [ "$TOTAL" != "100.0%" ]; then
            echo "FAIL: coverage is $TOTAL, expected 100.0%"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.25"
      # Build golangci-lint v2 from source — v2 module path supports Go 1.25 and the v2 config format.
      # Pre-built binaries are Go 1.24 and refuse Go 1.25; v1 module path ignores v2 config.
      - name: Install golangci-lint (v2)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run --path-prefix=go
        working-directory: go

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.25"
      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gosec
        run: gosec ./...
      - name: Run govulncheck
        run: govulncheck ./...

  vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.25"
      - name: Run go vet
        run: go vet ./...

  mutation:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.25"
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      - name: Run mutation tests
# Excluded files contain comparisons where gremlins boundary/arithmetic
        # mutations are mathematically equivalent (float64 exact equality P=0,
        # nanosecond time boundary P≈0). See file header comments.
        run: gremlins unleash --timeout-coefficient=10 --threshold-efficacy=100 --coverpkg="github.com/provide-io/provide-telemetry/go" --exclude-files="sampling_cmp.go" --exclude-files="resilience_cmp.go" .
