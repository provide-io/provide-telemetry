name: 🧬 Mutation Testing

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "scripts/run_mutation_gate.py"
      - "scripts/_mutmut_shims/**"
      - "rust/src/**"
      - "rust/tests/**"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - "typescript/src/**"
      - "typescript/tests/**"
      - "go/**"
      - ".github/workflows/ci-mutation.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "scripts/run_mutation_gate.py"
      - "scripts/_mutmut_shims/**"
      - "rust/src/**"
      - "rust/tests/**"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - "typescript/src/**"
      - "typescript/tests/**"
      - "go/**"
      - ".github/workflows/ci-mutation.yml"
  workflow_dispatch:
  # Nightly full mutation run — avoids blocking PRs on the multi-hour Rust sweep
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - "src/**"
              - "tests/**"
              - "!tests/tooling/test_rust_*.py"
              - "pyproject.toml"
              - "scripts/run_mutation_gate.py"
              - "scripts/_mutmut_shims/**"
            typescript:
              - "typescript/src/**"
              - "typescript/tests/**"
            rust:
              - "rust/src/**"
              - "rust/tests/**"
              - "rust/Cargo.toml"
              - "rust/Cargo.lock"
            go:
              - "go/**"

  python-mutation:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 2 --max-children 1 --min-mutation-score 100

  typescript-mutation:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run test:mutation

  rust-mutation:
    needs: changes
    # Advisory nightly/manual sweep only. Rust is not a release-blocking mutation gate.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: ${{ github.event_name == 'schedule' }}
    # Full mutation sweep can take several hours; cap at 4h to avoid runaway jobs.
    timeout-minutes: 240
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # Pinned SHA of dtolnay/rust-toolchain `stable` branch HEAD as of 2026-04-18.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable@2026-04-18
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: rust
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      # -j 4 runs four mutant test processes in parallel (matches 4-core GitHub runner).
      # --in-place is incompatible with -j in cargo-mutants v27+; use copy-per-mutant mode.
      # cargo-mutants exits 3 if any mutants are missed — this step fails the job.
      # All mutants must be caught (100% kill rate enforced).
      - name: Run cargo-mutants (100% kill rate required)
        run: cargo mutants -j 4 --no-shuffle --minimum-test-timeout 20 --timeout-multiplier 4

  go-mutation:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.25"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$(./ci/init-go-workspace.sh "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      # Excluded files contain comparisons where gremlins boundary/arithmetic
      # mutations are mathematically equivalent (float64 exact equality P=0,
      # nanosecond time boundary P≈0). See file header comments.
      # All surviving mutants fail the job (--threshold-efficacy=100).
      - name: Run gremlins mutation tests (100% kill rate required)
        run: gremlins unleash --timeout-coefficient=10 --threshold-efficacy=100 --coverpkg="github.com/provide-io/provide-telemetry/go" --exclude-files="sampling_cmp.go" --exclude-files="resilience_cmp.go" .
