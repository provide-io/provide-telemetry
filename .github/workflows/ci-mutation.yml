name: 🧬 Mutation Testing

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "scripts/run_mutation_gate.py"
      - "scripts/_mutmut_shims/**"
      - "rust/src/**"
      - "rust/tests/**"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - "typescript/src/**"
      - "typescript/tests/**"
      - "go/**"
      - ".github/workflows/ci-mutation.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "scripts/run_mutation_gate.py"
      - "scripts/_mutmut_shims/**"
      - "rust/src/**"
      - "rust/tests/**"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - "typescript/src/**"
      - "typescript/tests/**"
      - "go/**"
      - ".github/workflows/ci-mutation.yml"
  workflow_dispatch:
  # Nightly full mutation run — avoids blocking PRs on the multi-hour Rust sweep
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Detect changed implementation surfaces
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          python=false
          typescript=false
          rust=false
          go=false

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            python=true
            typescript=true
            rust=true
            go=true
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"

            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            fi

            if [[ -z "${head}" ]] || ! git cat-file -e "${head}^{commit}" 2>/dev/null; then
              head="$(git rev-parse HEAD)"
            fi

            if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              base="$(git rev-parse "${head}^" 2>/dev/null || true)"
            fi

            if [[ -n "${base}" ]]; then
              changed_files="$(git diff --name-only "${base}" "${head}")"
            else
              changed_files="$(git ls-files)"
            fi

            while IFS= read -r changed_file; do
              [[ -z "${changed_file}" ]] && continue

              case "${changed_file}" in
                src/*|tests/*|pyproject.toml|scripts/run_mutation_gate.py|scripts/_mutmut_shims/*)
                  case "${changed_file}" in
                    tests/tooling/test_rust_*.py) ;;
                    *) python=true ;;
                  esac
                  ;;
              esac

              case "${changed_file}" in
                typescript/src/*|typescript/tests/*) typescript=true ;;
              esac

              case "${changed_file}" in
                rust/src/*|rust/tests/*|rust/Cargo.toml|rust/Cargo.lock) rust=true ;;
              esac

              case "${changed_file}" in
                go/*) go=true ;;
              esac
            done <<< "${changed_files}"
          fi

          {
            echo "python=${python}"
            echo "typescript=${typescript}"
            echo "rust=${rust}"
            echo "go=${go}"
          } >> "${GITHUB_OUTPUT}"

  python-mutation:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8
        with:
          python-version: "3.11"
      - run: bash ci/run_uv_sync_with_retry.sh --group dev
      - run: uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 2 --max-children 1 --min-mutation-score 95

  typescript-mutation:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run test:mutation

  rust-mutation:
    needs: changes
    # Advisory nightly/manual sweep only. Rust is not a release-blocking mutation gate.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: ${{ github.event_name == 'schedule' }}
    # Full mutation sweep can take several hours; cap at 4h to avoid runaway jobs.
    timeout-minutes: 240
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # Pinned SHA of dtolnay/rust-toolchain `stable` branch HEAD as of 2026-04-18.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable@2026-04-18
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: rust
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      # Use nextest for the inner test runner and include all cargo features so
      # the mutation sweep exercises the OTEL-gated Rust surface as well as the
      # default governance build. A 300s floor avoids spurious timeouts on slow
      # CI hosts while still failing real surviving mutants.
      - name: Run cargo-mutants (100% kill rate required)
        run: cargo mutants --all-features --test-tool nextest -j 4 --no-shuffle --minimum-test-timeout 300 --timeout-multiplier 4

  go-mutation:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
      - name: Generate temporary go.work
        shell: bash
        run: |
          WORKFILE="$("$GITHUB_WORKSPACE/ci/init-go-workspace.sh" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/provide-telemetry-go-work")"
          echo "GOWORK=${WORKFILE}" >> "$GITHUB_ENV"
          export GOWORK="${WORKFILE}"
          echo "Using workspace: ${WORKFILE}"
          go env GOWORK
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      # Excluded files contain comparisons where gremlins boundary/arithmetic
      # mutations are mathematically equivalent (float64 exact equality P=0,
      # nanosecond time boundary P≈0). See file header comments.
      # Run each Go package surface explicitly:
      # - root package only (exclude sibling packages/modules and helper binaries)
      # - logger package
      # - tracer package
      # - optional go/otel module
      # All surviving mutants fail the job (--threshold-efficacy=100).
      - name: Run gremlins mutation tests for root package (100% kill rate required)
        run: |
          gremlins unleash \
            --workers=1 \
            --test-cpu=1 \
            --timeout-coefficient=30 \
            --threshold-efficacy=100 \
            --coverpkg="github.com/provide-io/provide-telemetry/go" \
            --exclude-files="sampling_cmp.go" \
            --exclude-files="resilience_cmp.go" \
            --exclude-files="cmd/e2e_cross_language_client/" \
            --exclude-files="examples/" \
            --exclude-files="internal/" \
            --exclude-files="logger/" \
            --exclude-files="otel/" \
            --exclude-files="scripts/stress/" \
            --exclude-files="tracer/" \
            .
      - name: Run gremlins mutation tests for go/logger (100% kill rate required)
        if: ${{ hashFiles('go/logger/go.mod') != '' }}
        run: |
          gremlins unleash \
            --workers=1 \
            --test-cpu=1 \
            --timeout-coefficient=30 \
            --threshold-efficacy=100 \
            ./logger
      - name: Run gremlins mutation tests for go/tracer (100% kill rate required)
        if: ${{ hashFiles('go/tracer/go.mod') != '' }}
        run: |
          gremlins unleash \
            --workers=1 \
            --test-cpu=1 \
            --timeout-coefficient=30 \
            --threshold-efficacy=100 \
            ./tracer
      - name: Run gremlins mutation tests for go/otel (100% kill rate required)
        if: ${{ hashFiles('go/otel/go.mod') != '' }}
        working-directory: go/otel
        run: |
          gremlins unleash \
            --workers=1 \
            --test-cpu=1 \
            --timeout-coefficient=30 \
            --threshold-efficacy=100 \
            --exclude-files="examples/" \
            .
