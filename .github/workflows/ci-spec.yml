name: 📐 Spec Conformance

on:
  push:
    branches: [main]
    paths:
      - "spec/**"
      - "ci/**"
      - "src/provide/telemetry/**"
      - "typescript/src/**"
      - "go/**"
      - "rust/**"
      - "csharp/**"
      - "VERSION"
      - "typescript/package.json"
      - "typescript/package-lock.json"
      - "pyproject.toml"
      - "scripts/check_version_sync.py"
      - ".github/workflows/ci-spec.yml"
  pull_request:
    branches: [main]
    paths:
      - "spec/**"
      - "ci/**"
      - "src/provide/telemetry/**"
      - "typescript/src/**"
      - "go/**"
      - "rust/**"
      - "csharp/**"
      - "VERSION"
      - "typescript/package.json"
      - "typescript/package-lock.json"
      - "pyproject.toml"
      - "scripts/check_version_sync.py"
      - ".github/workflows/ci-spec.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      # Checks all four languages match the API surface in spec/telemetry-api.yaml,
      # including governance-capability-gated symbols for languages that advertise governance.
      - name: API conformance check
        run: python spec/validate_conformance.py

  fixture-coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8
        with:
          python-version: "3.11"
      # Fails if any fixture category is missing from a language's parity tests
      # without a corresponding entry in spec/fixture_coverage_accepted_gaps.yaml.
      - name: Fixture coverage gate
        run: uv run python spec/check_fixture_coverage.py

  version-sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - name: Version sync check
        run: python scripts/check_version_sync.py

  behavioral-parity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # Python runtime for the orchestrator and Python parity tests
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8
        with:
          python-version: "3.11"
      # Node.js runtime for TypeScript parity tests
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      # Go runtime for Go parity tests
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25"
      # Rust toolchain for Rust parity tests — pinned SHA of `stable` branch HEAD as of 2026-04-18.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable@2026-04-18
        with:
          toolchain: stable
      # Cache Cargo registry and build artifacts to speed up Rust compilation
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: rust
      # Install Python and TypeScript dependencies
      - name: Install dependencies
        run: python ci/install_parity_deps.py
      # Run all four language parity suites with strict defaults: output-format probes
      # and contract DSL cases are both on by default (no flags required).
      # Each language runner covers every parity file counted by check_fixture_coverage.py:
      #   Python    — tests/parity/ (whole directory)
      #   TypeScript — tests/parity.test.ts + tests/endpoint.test.ts
      #   Go        — TestParity* + TestEndpointValidationParity (all parity_*_test.go files)
      #   Rust      — parity_test + parity_extra_test + parity_pii_fixes_test (three binaries)
      - name: Behavioral parity check
        run: uv run python spec/run_behavioral_parity.py
