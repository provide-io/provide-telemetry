name: 📐 Spec Conformance

on:
  push:
    branches: [main]
    paths:
      - "spec/**"
      - "ci/**"
      - "src/provide/telemetry/**"
      - "typescript/src/**"
      - "go/**"
      - "rust/**"
      - "csharp/**"
      - "VERSION"
      - "typescript/package.json"
      - "pyproject.toml"
      - ".github/workflows/ci-spec.yml"
  pull_request:
    branches: [main]
    paths:
      - "spec/**"
      - "ci/**"
      - "src/provide/telemetry/**"
      - "typescript/src/**"
      - "go/**"
      - "rust/**"
      - "csharp/**"
      - "VERSION"
      - "typescript/package.json"
      - "pyproject.toml"
      - ".github/workflows/ci-spec.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - name: API conformance check
        run: python spec/validate_conformance.py

  version-sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - name: Version sync check
        run: python scripts/check_version_sync.py

  behavioral-parity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # Python runtime for the orchestrator and Python parity tests
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          python-version: "3.11"
      # Node.js runtime for TypeScript parity tests
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      # Go runtime for Go parity tests
      - uses: actions/setup-go@v5  # TODO: pin to SHA when stable SHA is known
        with:
          go-version: "1.25"
      # Rust toolchain for Rust parity tests
      - uses: dtolnay/rust-toolchain@stable
      # Cache Cargo registry and build artifacts to speed up Rust compilation
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: rust
      # Install Python and TypeScript dependencies
      - name: Install dependencies
        run: python ci/install_parity_deps.py
      # Run all four language parity suites and report results
      - name: Behavioral parity check
        run: python spec/run_behavioral_parity.py
