name: 🚀 Release

on:
  push:
    # Only go sub-module tags trigger this workflow on push (for verify-go-proxy).
    # Main release builds/publishes are gated on GitHub Release creation below.
    tags:
      - 'go/logger/v*'
      - 'go/tracer/v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      # When retriggering a release manually, pass the tag so sign-and-upload targets the right release
      release_tag:
        description: 'Release tag to publish (e.g. v0.3.0). Leave blank to use current ref.'
        required: false
        default: ''

jobs:
  build:
    # Run on GitHub Release creation or manual dispatch only
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pytest --no-header -q
      - run: uv build
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: dist
          path: dist/*
      - name: Generate Python SBOM
        run: uvx cyclonedx-py environment --output-format json -o sbom-python.cdx.json
      - name: Generate TypeScript SBOM
        # Install deps first — cyclonedx-npm requires node_modules for npm-ls
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cd typescript
          npm ci
          cyclonedx-npm --output-file ../sbom-typescript.cdx.json
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: sbom-python
          path: sbom-python.cdx.json

  publish-testpypi:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/provide-telemetry
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  verify-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-24.04
    steps:
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          python-version: "3.11"
          enable-cache: false
      - name: Extract version from tag
        # Use workflow_dispatch release_tag input when set; fall back to ref name (e.g. v0.3.0)
        id: version
        run: |
          TAG="${{ inputs.release_tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Wait for TestPyPI propagation
        run: sleep 30
      - name: Install from TestPyPI and verify
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "provide-telemetry==${{ steps.version.outputs.version }}"
          python -c "
          from provide.telemetry import __version__
          assert __version__ == '${{ steps.version.outputs.version }}', \
              f'Version mismatch: {__version__} != ${{ steps.version.outputs.version }}'
          print(f'provide-telemetry {__version__} OK')
          "

  publish-pypi:
    needs: [build, verify-testpypi]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/provide-telemetry
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          # Safe to retrigger — skip if version already published
          skip-existing: true

  build-typescript:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: typescript/dist/
      - name: Generate TypeScript SBOM
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-format json --output-file sbom-typescript.cdx.json
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: npm-pack
          path: typescript/*.tgz

  build-rust:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cargo test --locked --all-targets --all-features
      - name: Package Rust crate
        run: cargo package --locked
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: rust-package
          path: rust/target/package/*.crate

  publish-npm:
    needs: build-npm
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    # continue-on-error: safe to retrigger — npm will fail with 403 if version already published
    continue-on-error: true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment:
      name: npm
      url: https://www.npmjs.com/package/@provide-io/telemetry
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Download the pre-built tarball from the build job
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: npm-pack
          path: npm-pack
      # Publish the packed tarball — NPM_TOKEN must be set as a repo secret
      - name: Publish to npm
        run: |
          ls -la npm-pack/
          cd npm-pack
          tar xzf *.tgz
          cd package
          cat package.json | head -5
          npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-rust:
    needs: build-rust
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment:
      name: crates-io
      url: https://crates.io/crates/provide-telemetry
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  sign-and-upload:
    needs: [build, build-rust]
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom-python
          path: sbom
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom-typescript
          path: sbom
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: rust-package
          path: rust-dist
      - uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46  # v3.0.0
        with:
          inputs: dist/*.whl dist/*.tar.gz
      - name: Upload artifacts and signatures to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.whl dist/*.tar.gz dist/*.sigstore.json \
            rust-dist/*.crate \
            sbom/sbom-python.cdx.json \
            sbom/sbom-typescript.cdx.json \
            --clobber

  publish-npm:
    needs: build-typescript
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
      contents: read
    environment:
      name: npm
      url: https://www.npmjs.com/package/@undef-games/telemetry
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: typescript-dist
          path: typescript/dist
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
