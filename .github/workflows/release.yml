name: 7. 🚀 Release

on:
  push:
    tags:
      - "v*"
      - "undef-telemetry-v*"
      - "telemetry-v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python -m build
      - run: uv run twine check dist/*
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: dist
          path: dist/*
      - name: Generate Python SBOM
        run: |
          uv run pip install cyclonedx-bom
          uv run cyclonedx-py environment --output-format json -o sbom-python.cdx.json
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: sbom-python
          path: sbom-python.cdx.json

  publish-testpypi:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/undef-telemetry
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(python -c 'print(open("VERSION").read().strip())')" >> "$GITHUB_OUTPUT"
          fi
      - name: Wait for TestPyPI propagation
        run: sleep 30
      - name: Install from TestPyPI and verify
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "undef-telemetry==${{ steps.version.outputs.version }}"
          python -c "
          import undef.telemetry as t
          print(f'Installed version: {t.__version__}')
          assert t.__version__ == '${{ steps.version.outputs.version }}', \
              f'Version mismatch: {t.__version__} != ${{ steps.version.outputs.version }}'
          print('TestPyPI verification passed')
          "

  publish-pypi:
    needs: [build, verify-testpypi]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/undef-telemetry
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1

  build-typescript:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: typescript-dist
          path: typescript/dist/
      - name: Generate TypeScript SBOM
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-format json --output-file sbom-typescript.cdx.json
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: sbom-typescript
          path: typescript/sbom-typescript.cdx.json

  sign-and-upload:
    needs: [build, build-typescript]
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom-python
          path: sbom
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom-typescript
          path: sbom
      - uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46  # v3
        with:
          inputs: dist/*.whl dist/*.tar.gz
      - name: Upload artifacts and signatures to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.whl dist/*.tar.gz dist/*.sigstore.json \
            sbom/sbom-python.cdx.json \
            sbom/sbom-typescript.cdx.json \
            --clobber

  publish-npm:
    needs: build-typescript
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    permissions:
      id-token: write
      contents: read
    environment:
      name: npm
      url: https://www.npmjs.com/package/@undef/telemetry
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: typescript-dist
          path: typescript/dist
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
