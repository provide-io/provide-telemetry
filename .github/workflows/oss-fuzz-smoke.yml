# Proves the OSS-Fuzz project recipe works on real linux/amd64 (GitHub-hosted),
# not Mac/qemu: build libFuzzer binaries via google/oss-fuzz helper and run one.
name: 🐹 OSS-Fuzz smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "go/fuzz_test.go"
      - "go/config_helpers.go"
      - "infra/oss-fuzz/**"
      - ".github/workflows/oss-fuzz-smoke.yml"
  push:
    paths:
      - "infra/oss-fuzz/**"
      - "go/fuzz_test.go"

permissions:
  contents: read

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout provide-telemetry
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          path: provide-telemetry

      - name: Checkout google/oss-fuzz
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          repository: google/oss-fuzz
          path: oss-fuzz

      - name: Install project recipe
        run: |
          mkdir -p oss-fuzz/projects/provide-telemetry
          cp provide-telemetry/infra/oss-fuzz/project.yaml \
             provide-telemetry/infra/oss-fuzz/Dockerfile \
             provide-telemetry/infra/oss-fuzz/build.sh \
             oss-fuzz/projects/provide-telemetry/
          chmod +x oss-fuzz/projects/provide-telemetry/build.sh

      - name: Build fuzzers (local source)
        working-directory: oss-fuzz
        run: |
          python3 infra/helper.py build_image --no-pull provide-telemetry || \
            python3 infra/helper.py build_image provide-telemetry
          python3 infra/helper.py build_fuzzers --sanitizer address --engine libfuzzer \
            provide-telemetry "$GITHUB_WORKSPACE/provide-telemetry"

      - name: List built fuzzers
        run: ls -la oss-fuzz/build/out/provide-telemetry/ | tee fuzzer-list.txt

      - name: Run FuzzValidateRate briefly
        working-directory: oss-fuzz
        run: |
          python3 infra/helper.py run_fuzzer provide-telemetry FuzzValidateRate \
            -- -max_total_time=30 -print_final_stats=1

      - name: Upload fuzzer list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oss-fuzz-out-listing
          path: fuzzer-list.txt
