name: 🔒 CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7  # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/autobuild@e46ed2cbd01164d986452f91f178727624ae40d7  # v3
      - uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7  # v3
        with:
          category: "/language:${{ matrix.language }}"
