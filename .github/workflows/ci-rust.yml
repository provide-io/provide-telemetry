name: "🦀 CI — Rust"

on:
  push:
    paths:
      - "rust/**"
      - "spec/**"
      - ".github/workflows/ci-rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - "spec/**"
      - ".github/workflows/ci-rust.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      # Cache Cargo registry and build artefacts to speed up incremental builds
      - uses: Swatinem/rust-cache@9d47c6ad4b02f74cd1c6df580bba6e6af45df269  # v2
        with:
          workspaces: rust
      # Check formatting
      - name: Cargo fmt
        run: cargo fmt --check --manifest-path Cargo.toml
      - name: Cargo test
        run: cargo test --manifest-path Cargo.toml
      - name: Cargo clippy
        run: cargo clippy --manifest-path Cargo.toml --all-targets --all-features -- -D warnings

  test-otel:
    name: Rust — test with otel feature
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rust
    steps:
      # Checkout the repository
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # Install the stable Rust toolchain
      - uses: dtolnay/rust-toolchain@stable
      # Cache Cargo registry and build artefacts to speed up incremental builds
      - uses: Swatinem/rust-cache@9d47c6ad4b02f74cd1c6df580bba6e6af45df269  # v2
        with:
          workspaces: rust
      # Run tests with the otel feature enabled — verifies OTel log/metrics wiring
      # compiles and the unit-level OTel provider tests pass.
      - name: Cargo test with otel feature
        run: cargo test --features otel

  conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          python-version: "3.11"
      - name: Validate Rust conformance
        run: uv run python spec/validate_conformance.py --lang rust
