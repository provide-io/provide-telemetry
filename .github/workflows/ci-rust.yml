name: "🦀 CI — Rust"

on:
  push:
    paths:
      - "rust/**"
      - "spec/**"
      - "VERSION"
      - ".github/workflows/ci-rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - "spec/**"
      - "VERSION"
      - ".github/workflows/ci-rust.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      # Check formatting
      - name: Cargo fmt
        run: cargo fmt --check --manifest-path Cargo.toml
      # Run tests and collect coverage via cargo-llvm-cov
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Cargo test with coverage
        run: cargo llvm-cov --all-targets --fail-under-lines 70
      # Static analysis
      - name: Cargo clippy
        run: cargo clippy --manifest-path Cargo.toml --all-targets --all-features -- -D warnings

  conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          python-version: "3.11"
      # Verify exported symbols match the canonical API spec
      - name: Validate Rust conformance
        run: uv run python spec/validate_conformance.py --lang rust
