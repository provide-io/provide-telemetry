name: "🦀 CI — Rust"

on:
  push:
    paths:
      - "rust/**"
      - "spec/**"
      - ".github/workflows/ci-rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - "spec/**"
      - ".github/workflows/ci-rust.yml"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
        features: ["", "--no-default-features", "--features otel", "--features otel-grpc"]
        exclude:
          # Full feature matrix on Linux; default-only on Windows/macOS to keep CI cost bounded.
          - os: windows-2025
            features: "--no-default-features"
          - os: windows-2025
            features: "--features otel"
          - os: windows-2025
            features: "--features otel-grpc"
          - os: macos-15
            features: "--no-default-features"
          - os: macos-15
            features: "--features otel"
          - os: macos-15
            features: "--features otel-grpc"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # Pinned SHA of dtolnay/rust-toolchain `stable` branch HEAD as of 2026-04-18.
      # Bump explicitly when the upstream `stable` branch advances.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable@2026-04-18
        with:
          toolchain: stable
      # Format check only on Linux default (no point repeating per OS/feature)
      - name: Cargo fmt (Linux default only)
        if: matrix.os == 'ubuntu-24.04' && matrix.features == ''
        run: cargo fmt --check --manifest-path Cargo.toml
      # Run tests with the selected feature set
      - name: Cargo test ${{ matrix.features }}
        run: cargo test --manifest-path Cargo.toml ${{ matrix.features }}
      # Clippy with all features on Linux default; with selected features elsewhere
      - name: Cargo clippy ${{ matrix.features }}
        run: cargo clippy --manifest-path Cargo.toml --all-targets ${{ matrix.features || '--all-features' }} -- -D warnings

  conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          python-version: "3.11"
      - name: Validate Rust conformance
        run: uv run python spec/validate_conformance.py --lang rust

  otlp-integration:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # Pinned SHA of dtolnay/rust-toolchain `stable` branch HEAD as of 2026-04-18.
      # Bump explicitly when the upstream `stable` branch advances.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable@2026-04-18
        with:
          toolchain: stable
      - name: Prepare collector output directory
        run: |
          mkdir -p ../tests/integration/otel-output-rust
          rm -f ../tests/integration/otel-output-rust/*.json
      - name: Start OTLP collector
        run: |
          docker run -d --name otelcol-rust \
            -p 4318:4318 \
            -p 13133:13133 \
            -v "$PWD/../tests/integration/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:0.102.1
      - name: Wait for collector health
        run: ../ci/wait-for-collector.sh
      - name: Run collector-backed OTLP smoke test
        run: cargo test --manifest-path Cargo.toml --features otel --test otlp_collector_test -- --test-threads=1
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://127.0.0.1:4318"
          PROVIDE_TEST_OTLP_ENDPOINT: "http://127.0.0.1:4318"
          PROVIDE_TEST_OTLP_OUTPUT_DIR: "${{ github.workspace }}/tests/integration/otel-output-rust"
      - name: Collector logs
        if: always()
        run: docker logs otelcol-rust || true
      - name: Capture collector logs
        run: docker logs otelcol-rust > ../tests/integration/otel-output-rust/collector.log 2>&1
      - name: Verify collector exported all signals
        run: |
          grep -q "integration.collector.span" ../tests/integration/otel-output-rust/collector.log
          grep -q "integration.collector.requests" ../tests/integration/otel-output-rust/collector.log
          grep -q "integration.collector.log" ../tests/integration/otel-output-rust/collector.log
      - name: Stop collector
        if: always()
        run: |
          docker stop otelcol-rust || true
          docker rm otelcol-rust || true

  performance-smoke:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # Pinned SHA of dtolnay/rust-toolchain `stable` branch HEAD as of 2026-04-18.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable@2026-04-18
        with:
          toolchain: stable
      # Run criterion benchmarks in --quick mode (single-shot timings, no
      # statistical analysis). Report-only — no threshold enforcement, mirrors
      # the Python perf-smoke pattern. Exists to catch a hot-path benchmark
      # going completely broken (e.g. compile error after a refactor) so a
      # silent regression cannot hide in the Rust implementation.
      - name: Cargo bench (smoke, --quick)
        run: cargo bench --bench hot_path -- --quick
