name: 🟦 CI — TypeScript

on:
  push:
    branches: [main]
    paths:
      - "typescript/**"
      - "VERSION"
      - ".github/workflows/ci-typescript.yml"
      - ".github/actions/setup-openobserve/**"
  pull_request:
    branches: [main]
    paths:
      - "typescript/**"
      - "VERSION"
      - ".github/workflows/ci-typescript.yml"
      - ".github/actions/setup-openobserve/**"
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read

jobs:
  typescript-quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      # uv is needed for the perf-gate comparator (scripts/perf_check.py).
      # Matches the rest of this repo's CI; perf_check uses only stdlib so no
      # additional Python deps are installed (no `uv sync` here).
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          python-version: "3.11"
      - name: SPDX header check
        shell: bash
        run: |
          MISSING=""
          for f in $(find src tests -name '*.ts' -not -path '*/node_modules/*'); do
            if ! head -3 "$f" | grep -q 'SPDX-License-Identifier'; then
              MISSING="$MISSING\n  $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "Missing SPDX headers:$MISSING"
            exit 1
          fi
          echo "All TypeScript files have SPDX headers"
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run test:coverage
      # Pipe perf-smoke output through perf_check.py — compares each measurement
      # against baselines/perf-typescript.json for this runner's OS bucket. Missing
      # buckets exit 0 with a hint so seeding via CI is straightforward.
      - name: Run perf gate
        shell: bash
        run: npx tsx scripts/perf-smoke.ts --emit-json | uv run --no-project python ../scripts/perf_check.py --lang typescript

  typescript-examples-smoke:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      # Run all standalone telemetry examples (no live backend required)
      - name: Run telemetry examples
        run: |
          set -euo pipefail
          for f in examples/telemetry/*.ts; do
            echo "running $f"
            npx tsx "$f"
          done
      - name: Setup OpenObserve
        uses: ./.github/actions/setup-openobserve
      # Run OpenObserve examples against a live local instance
      - name: Run OpenObserve examples
        env:
          OPENOBSERVE_REQUIRED_SIGNALS: logs,traces,metrics
        run: |
          set -euo pipefail
          for f in examples/openobserve/*.ts; do
            echo "running $f"
            npx tsx "$f"
          done
      - name: OpenObserve logs
        if: always()
        run: docker logs openobserve-local || true

  otlp-integration:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - name: Prepare collector output directory
        run: |
          mkdir -p ../tests/integration/otel-output-typescript
          rm -f ../tests/integration/otel-output-typescript/*.json
      - name: Start OTLP collector
        run: |
          docker run -d --name otelcol-typescript \
            -p 127.0.0.1:4318:4318 \
            -p 127.0.0.1:13133:13133 \
            -v "$PWD/../tests/integration/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:0.102.1
      - name: Wait for collector health
        run: ../ci/wait-for-collector.sh
      - name: Run collector-backed OTLP smoke test
        run: npx vitest run tests/integration/otlp-collector.test.ts
        env:
          PROVIDE_TEST_OTLP_ENDPOINT: "http://127.0.0.1:4318"
          PROVIDE_TEST_OTLP_OUTPUT_DIR: "${{ github.workspace }}/tests/integration/otel-output-typescript"
      - name: Collector logs
        if: always()
        run: docker logs otelcol-typescript || true
      - name: Capture collector logs
        run: docker logs otelcol-typescript > ../tests/integration/otel-output-typescript/collector.log 2>&1
      # Poll the collector log until every required signal name appears, with
      # a 30s deadline (see ci/verify-collector-signals.sh for rationale).
      - name: Verify collector exported all signals
        env:
          OTELCOL_CONTAINER: otelcol-typescript
        run: ../ci/verify-collector-signals.sh ../tests/integration/otel-output-typescript/collector.log integration.collector.span integration.collector.requests integration.collector.log
      - name: Stop collector
        if: always()
        run: |
          docker stop otelcol-typescript || true
          docker rm otelcol-typescript || true
