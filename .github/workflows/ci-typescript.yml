name: 2. 🟦 CI — TypeScript

on:
  push:
    branches: [main]
    paths:
      - "typescript/**"
      - "VERSION"
      - ".github/workflows/ci-typescript.yml"
      - ".github/actions/setup-openobserve/**"
  pull_request:
    branches: [main]
    paths:
      - "typescript/**"
      - "VERSION"
      - ".github/workflows/ci-typescript.yml"
      - ".github/actions/setup-openobserve/**"
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read

jobs:
  typescript-quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run test:coverage

  typescript-openobserve-smoke:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - name: Setup OpenObserve
        uses: ./.github/actions/setup-openobserve
      - name: Run OpenObserve examples
        env:
          OPENOBSERVE_REQUIRED_SIGNALS: logs,traces,metrics
        run: |
          set -euo pipefail
          for f in examples/openobserve/*.ts; do
            echo "running $f"
            npx tsx "$f"
          done
      - name: OpenObserve logs
        if: always()
        run: docker logs openobserve-local || true
