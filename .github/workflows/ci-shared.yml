name: 3. 📋 CI — Shared

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Markdown lint + docs accuracy
        run: uv run python scripts/check_docs_accuracy.py
      - name: README snippet tests
        run: uv run python scripts/run_pytest_gate.py tests/docs tests/tooling/test_check_docs_accuracy.py --no-cov -q

  release-readiness:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python -m build
      - run: uv run twine check dist/*

  openobserve-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      OPENOBSERVE_URL: ${{ vars.OPENOBSERVE_URL }}
      OPENOBSERVE_USER: ${{ secrets.OPENOBSERVE_USER }}
      OPENOBSERVE_PASSWORD: ${{ secrets.OPENOBSERVE_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
        working-directory: typescript
      - run: uv sync --group dev --extra otel
      - run: uv run python -m playwright install --with-deps chromium
      - name: Run OpenObserve E2E
        run: |
          if [ -z "${OPENOBSERVE_URL}" ] || [ -z "${OPENOBSERVE_USER}" ] || [ -z "${OPENOBSERVE_PASSWORD}" ]; then
            echo "OPENOBSERVE_* not configured; skipping e2e run."
            exit 0
          fi
          uv run python scripts/run_pytest_gate.py -m e2e --no-cov -q
