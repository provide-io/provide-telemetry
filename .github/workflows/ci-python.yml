name: 🐍 CI — Python

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "e2e/**"
      - "examples/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "VERSION"
      - ".github/workflows/ci-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "e2e/**"
      - "examples/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "VERSION"
      - ".github/workflows/ci-python.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          # Full Python matrix on Linux; only 3.11 on Windows and macOS
          - os: windows-2025
            python-version: "3.12"
          - os: windows-2025
            python-version: "3.13"
          - os: windows-2025
            python-version: "3.14"
          - os: macos-15
            python-version: "3.12"
          - os: macos-15
            python-version: "3.13"
          - os: macos-15
            python-version: "3.14"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run python scripts/check_max_loc.py --max-lines 500
      - run: uv run python scripts/check_spdx_headers.py
      - run: uv run python scripts/check_event_literals.py
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: uv run ty check src tests
      - run: uv run bandit -r src -ll
        if: runner.os == 'Linux'
      - run: uv run xenon --max-absolute C --max-modules B --max-average A src/
        if: runner.os == 'Linux'
      - run: uv run vulture src/ tests/
      - run: uv run python -m pip_audit --path .
        if: runner.os == 'Linux'
      - run: uv run python scripts/check_licenses.py
        if: runner.os == 'Linux'
      - run: uv run python scripts/run_pytest_gate.py

  compliance:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uvx reuse lint
      - run: uv sync --group dev
      - run: uv run codespell

  otel-extras-validation:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev --extra otel
      - run: uv run python scripts/run_pytest_gate.py -m otel --no-cov -q

  examples-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev --extra otel
      - name: Run telemetry examples
        run: |
          set -euo pipefail
          for f in examples/telemetry/*.py; do
            echo "running $f"
            uv run --group dev --extra otel python "$f"
          done
      - name: Setup OpenObserve
        uses: ./.github/actions/setup-openobserve
      - name: Run OpenObserve examples
        run: |
          set -euo pipefail
          for f in examples/openobserve/*.py; do
            echo "running $f"
            uv run --group dev --extra otel python "$f"
          done
      - name: OpenObserve logs
        if: always()
        run: docker logs openobserve-local || true
      - name: Stop OpenObserve
        if: always()
        run: docker rm -f openobserve-local || true

  otlp-integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - name: Prepare collector output directory
        run: |
          mkdir -p tests/integration/otel-output-python
          rm -f tests/integration/otel-output-python/*.json
      - name: Start OTLP collector
        run: |
          docker run -d --name otelcol \
            -p 4318:4318 \
            -p 13133:13133 \
            -v "$PWD/tests/integration/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:0.102.1
      - name: Wait for collector health
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:13133/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "collector failed health check"
          exit 1
      - run: uv sync --group dev --extra otel
      - run: uv run python scripts/run_pytest_gate.py -m integration --no-cov -q
        env:
          PROVIDE_TEST_OTLP_ENDPOINT: "http://127.0.0.1:4318"
          PROVIDE_TEST_OTLP_OUTPUT_DIR: "${{ github.workspace }}/tests/integration/otel-output-python"
      - name: Collector logs
        if: always()
        run: docker logs otelcol || true
      - name: Capture collector logs
        run: docker logs otelcol > tests/integration/otel-output-python/collector.log 2>&1
      # Poll the collector log until every required signal name appears, with
      # a 30s deadline (see ci/verify-collector-signals.sh for rationale).
      - name: Verify collector exported all signals
        env:
          OTELCOL_CONTAINER: otelcol
        run: ./ci/verify-collector-signals.sh tests/integration/otel-output-python/collector.log integration.otlp.smoke integration.requests integration.otlp.log
      - name: Stop collector
        if: always()
        run: |
          docker stop otelcol || true
          docker rm otelcol || true

  performance-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev --extra otel
      # Pipe runner output through perf_check.py — compares each measurement
      # against baselines/perf-python.json for this runner's OS bucket. When a
      # bucket is missing (e.g. a fresh Windows runner without a baseline) the
      # gate exits 0 with a hint so the operator can seed it.
      - name: Run perf gate
        shell: bash
        run: uv run python scripts/run_performance_smoke.py --iterations 300000 --runs 5 --emit-json | uv run python scripts/perf_check.py --lang python

  memory-regression:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Run memray stress tests
        run: uv run pytest tests/memray/ -m memray -v --tb=short --no-cov -p no:undef_telemetry
      - name: Upload memray artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: memray-output
          path: memray-output/
          retention-days: 30
