name: 1. 🐍 CI — Python

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "e2e/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "VERSION"
      - ".github/workflows/ci-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "e2e/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "VERSION"
      - ".github/workflows/ci-python.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run python scripts/check_max_loc.py --max-lines 500
      - run: uv run python scripts/check_spdx_headers.py
      - run: uv run python scripts/check_event_literals.py
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: uv run ty check src tests
      - run: uv run bandit -r src -ll
      - run: uv run xenon --max-absolute C --max-modules B --max-average A src/
      - run: uv run vulture src/ tests/
      - run: uv run python -m pip_audit --path .
      - run: uv run python scripts/check_licenses.py
      - run: uv run python scripts/run_pytest_gate.py

  mutation-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 2 --max-children 1 --min-mutation-score 100

  mutation-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Find changed source files
        id: changed
        run: |
          files=$(git diff --name-only origin/main...HEAD -- 'src/**/*.py' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run mutation testing on changed files
        if: steps.changed.outputs.skip == 'false'
        run: uv run mutmut run ${{ steps.changed.outputs.files }}
      - name: Check mutation score
        if: steps.changed.outputs.skip == 'false'
        run: |
          result=$(uv run mutmut results)
          if echo "$result" | grep -q "survived"; then
            echo "::error::Surviving mutants found in changed files"
            echo "$result" | grep "survived"
            exit 1
          fi
          echo "All mutants killed in changed files"

  compliance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uvx reuse lint
      - run: uv sync --group dev
      - run: uv run codespell

  otel-extras-validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev --extra otel
      - run: uv run python scripts/run_pytest_gate.py -m otel --no-cov -q

  examples-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev --extra otel
      - name: Generate OpenObserve credentials
        run: |
          echo "OPENOBSERVE_USER=${OPENOBSERVE_SMOKE_USER:-smoke@example.test}" >> "$GITHUB_ENV"
          echo "OPENOBSERVE_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
      - name: Run telemetry examples
        run: |
          set -euo pipefail
          for f in examples/telemetry/*.py; do
            echo "running $f"
            uv run --group dev --extra otel python "$f"
          done
      - name: Start OpenObserve
        run: |
          docker run -d --name openobserve-local \
            -p 5080:5080 \
            -e "ZO_ROOT_USER_EMAIL=${OPENOBSERVE_USER}" \
            -e "ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_PASSWORD}" \
            openobserve/openobserve:v0.14.5
      - name: Wait for OpenObserve health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS -o /dev/null http://127.0.0.1:5080/; then
              exit 0
            fi
            sleep 1
          done
          echo "openobserve failed health check"
          exit 1
      - name: Run OpenObserve examples
        env:
          OPENOBSERVE_URL: http://127.0.0.1:5080/api/default
          OPENOBSERVE_USER: ${{ env.OPENOBSERVE_USER }}
          OPENOBSERVE_PASSWORD: ${{ env.OPENOBSERVE_PASSWORD }}
        run: |
          set -euo pipefail
          for f in examples/openobserve/*.py; do
            echo "running $f"
            uv run --group dev --extra otel python "$f"
          done
      - name: OpenObserve logs
        if: always()
        run: docker logs openobserve-local || true
      - name: Stop OpenObserve
        if: always()
        run: docker rm -f openobserve-local || true

  otlp-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - name: Start OTLP collector
        run: |
          docker run -d --name otelcol \
            -p 4318:4318 \
            -p 13133:13133 \
            -v "$PWD/tests/integration/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:0.102.1
      - name: Wait for collector health
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:13133/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "collector failed health check"
          exit 1
      - run: uv sync --group dev --extra otel
      - run: uv run python scripts/run_pytest_gate.py -m integration --no-cov -q
        env:
          UNDEF_TEST_OTLP_ENDPOINT: "http://127.0.0.1:4318"
      - name: Collector logs
        if: always()
        run: docker logs otelcol || true
      - name: Stop collector
        if: always()
        run: docker rm -f otelcol || true

  performance-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev --extra otel
      - run: uv run python scripts/run_performance_smoke.py --iterations 300000

  memory-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Run memray stress tests
        run: uv run pytest tests/memray/ -m memray -v --tb=short --no-cov -p no:undef_telemetry
      - name: Upload memray artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: memray-output
          path: memray-output/
          retention-days: 30
