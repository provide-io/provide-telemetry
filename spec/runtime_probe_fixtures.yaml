cases:
  - id: lazy_init_logger
    kind: record
    expected:
      message: "log.output.parity"
      level: "INFO"
      service: "probe"
      env: "parity"
      version: "1.2.3"
      logger_name: "probe"
      trace_id: "0af7651916cd43dd8448eb211c80319c"
      span_id: "b7ad6b7169203331"

  - id: lazy_logger_shutdown_re_setup
    kind: flags
    expected:
      first_logger_emitted: true
      shutdown_cleared_setup: true
      shutdown_cleared_providers: true
      shutdown_fallback_all: true
      re_setup_done: true
      second_logger_uses_fresh_config: true

  - id: strict_schema_rejection
    kind: flags
    expected:
      emitted: true
      schema_error: true

  - id: strict_event_name_only
    kind: flags
    expected:
      emitted: true
      schema_error: true

  - id: required_keys_rejection
    kind: flags
    expected:
      emitted: true
      schema_error: true

  - id: invalid_config
    kind: flags
    expected:
      raised: true

  - id: fail_open_exporter_init
    kind: flags
    expected:
      setup_done: true
      providers_cleared: true
      fallback_all: true

  - id: signal_enablement
    kind: flags
    expected:
      setup_done: true
      logs_enabled: true
      traces_enabled: false
      metrics_enabled: false

  - id: per_signal_logs_endpoint
    kind: flags
    expected:
      setup_done: true
      logs_provider: true
      traces_provider: false
      metrics_provider: false

  - id: provider_identity_reconfigure
    kind: flags
    expected:
      providers_active: true
      raised: true
      config_preserved: true

  - id: shutdown_re_setup
    kind: flags
    expected:
      first_setup_done: true
      shutdown_cleared_setup: true
      shutdown_cleared_providers: true
      shutdown_fallback_all: true
      re_setup_done: true
      signals_match: true
      providers_match: true

  # ── Hot-reload logging parity (Claim 3 coverage) ────────────────────────
  # All four languages expose update_runtime_config({logging: ...}) which
  # must rebuild the logging pipeline so level/format/module-level changes
  # take effect on the next log event without touching provider-wiring
  # fields. These three cases probe that contract end-to-end.

  - id: hot_reload_log_level
    kind: flags
    expected:
      first_debug_suppressed: true
      second_debug_emitted: true
      level_config_updated: true
      service_preserved: true

  - id: hot_reload_log_format
    kind: flags
    expected:
      format_config_updated: true
      service_preserved: true
      providers_unchanged: true

  - id: hot_reload_module_level
    kind: flags
    expected:
      first_debug_suppressed: true
      module_debug_emitted: true
      module_levels_config_updated: true
      service_preserved: true
