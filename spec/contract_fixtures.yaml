#
# Contract probe DSL fixtures — step-based cross-language parity cases.
# Each case exercises real public APIs and verifies observable outputs.
# The harness in parity_probe_support.py spawns all 4 language probes per
# case and cross-compares their JSON output against these expected values.

contract_cases:

  propagation_to_logger_correlation:
    description: "Propagated W3C trace IDs appear on log records"
    steps:
      - op: setup
      - op: bind_propagation
        traceparent: "00-aabbccdd11223344aabbccdd11223344-aabb001122334455-01"
        baggage: "userId=alice,tenant=acme"
      - op: emit_log
        message: "test.propagation.ok"
        fields:
          event: "test.propagation.ok"
      - op: capture_log
        into: last_log
      - op: get_trace_context
        into: trace_ctx
      - op: clear_propagation
      - op: shutdown
    expect:
      last_log.trace_id: "aabbccdd11223344aabbccdd11223344"
      last_log.span_id: "aabb001122334455"
      last_log.message: "test.propagation.ok"
      'last_log["baggage.userId"]': "alice"
      'last_log["baggage.tenant"]': "acme"
      trace_ctx.trace_id: "aabbccdd11223344aabbccdd11223344"

  trace_field_precedence:
    description: "Propagation context overwrites a manually bound trace_id"
    steps:
      - op: setup
      - op: bind_context
        fields:
          trace_id: "deadbeefdeadbeefdeadbeefdeadbeef"
          span_id: "deadbeefdeadbeef"
      - op: bind_propagation
        traceparent: "00-aabbccdd11223344aabbccdd11223344-aabb001122334455-01"
      - op: emit_log
        message: "test.precedence.ok"
        fields:
          event: "test.precedence.ok"
      - op: capture_log
        into: last_log
      - op: clear_propagation
      - op: shutdown
    expect:
      last_log.trace_id: "aabbccdd11223344aabbccdd11223344"
      last_log.span_id: "aabb001122334455"

  setup_invalid_overrides:
    description: "Passing an out-of-range config value raises a ConfigurationError"
    steps:
      - op: setup_invalid
        overrides:
          samplingLogsRate: -1
        into: result
      - op: shutdown
    expect:
      result.raised: true

  shutdown_re_setup:
    description: "After shutdown, re-setup with different config produces fresh state"
    steps:
      - op: setup
        overrides:
          serviceName: "initial-service"
      - op: shutdown
      - op: setup
        overrides:
          serviceName: "restarted-service"
      - op: get_runtime_status
        into: status
      - op: shutdown
    expect:
      status.active: true
      status.service_name: "restarted-service"

  custom_secret_pattern_redacts_message:
    description: "Registered custom secret patterns redact matching free-form log messages"
    steps:
      - op: setup
      - op: register_secret_pattern
        name: "internal_token"
        pattern: "INTSECRET-[A-Z0-9]{12,}"
      - op: emit_log
        message: "token INTSECRET-ABC123XYZ789 leaked"
      - op: capture_log
        into: last_log
      - op: shutdown
    expect:
      last_log.message: "***"

  baggage_auto_injection:
    description: "Baggage key=value pairs are injected onto log records; W3C properties are stripped"
    steps:
      - op: setup
      - op: bind_propagation
        traceparent: "00-aabbccdd11223344aabbccdd11223344-aabb001122334455-01"
        baggage: "userId=alice;prop1=x,tenant=acme;prop2=y"
      - op: emit_log
        message: "test.baggage.ok"
        fields:
          event: "test.baggage.ok"
      - op: capture_log
        into: last_log
      - op: clear_propagation
      - op: shutdown
    expect:
      'last_log["baggage.userId"]': "alice"
      'last_log["baggage.tenant"]': "acme"

  propagation_cleanup:
    description: "After clear_propagation, trace IDs and baggage are absent from log records"
    steps:
      - op: setup
      - op: bind_propagation
        traceparent: "00-aabbccdd11223344aabbccdd11223344-aabb001122334455-01"
        baggage: "userId=alice"
      - op: clear_propagation
      - op: emit_log
        message: "test.cleanup.ok"
        fields:
          event: "test.cleanup.ok"
      - op: capture_log
        into: last_log
      - op: shutdown
    expect:
      last_log.trace_id: ""
      last_log.span_id: ""
      'last_log["baggage.userId"]': ""
