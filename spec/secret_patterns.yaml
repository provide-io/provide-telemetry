#
# Canonical secret detection patterns — single source of truth.
# All four language implementations generate their built-in patterns from this file.
#
# To add a new pattern:
#   1. Add an entry below
#   2. Run: uv run python scripts/generate_secret_patterns.py
#   3. Verify: uv run python scripts/generate_secret_patterns.py --check
#   4. Commit the YAML + all generated files
#
# Each entry:
#   name:        diagnostic label (used in getSecretPatterns() output)
#   regex:       PCRE-compatible pattern (must work in Python re, JS RegExp, Go regexp, Rust regex)
#   description: what it matches (for documentation only)

min_secret_length: 20  # shortest pattern (AKIA + 16) is 20 chars

patterns:
  - name: aws_key
    regex: "(?:AKIA|ASIA)[A-Z0-9]{16}"
    description: AWS access key ID

  - name: jwt
    regex: "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"
    description: JSON Web Token (header.payload)

  - name: github_token
    regex: "gh[pos]_[A-Za-z0-9_]{36,}"
    description: GitHub personal access token / OAuth / app token

  - name: long_hex
    regex: "[0-9a-fA-F]{40,}"
    description: Long hex string (SHA hashes, API keys)

  - name: long_base64
    regex: "[A-Za-z0-9+/]{40,}={0,2}"
    description: Long base64 string (encoded secrets, keys)
